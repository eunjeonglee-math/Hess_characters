<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Root Poset / Hessenberg Data Browser</title>
  <style>
    :root {
      --bg: #f1f5f9;
      --card: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --line: #cbd5e1;
      --border: #e2e8f0;
      --accent: #0f172a;
      --accent-2: #334155;
      --disabled: #e2e8f0;
      --derived: #fde68a;
      --derived-border: #f59e0b;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .container {
      max-width: 1350px;
      margin: 0 auto;
      padding: 24px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.06);
      padding: 24px;
      margin-bottom: 24px;
    }
    h1, h2, h3 { margin: 0 0 10px; }
    p { margin: 0; color: var(--muted); }
    .controls {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 16px;
      align-items: end;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    select, button {
      width: 100%;
      padding: 11px 14px;
      border-radius: 14px;
      border: 1px solid var(--line);
      font-size: 15px;
      background: white;
    }
    button {
      background: var(--accent);
      color: white;
      border: none;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    button:hover { background: var(--accent-2); }
    .grid {
      display: grid;
      grid-template-columns: minmax(0,1fr) 140px minmax(0,1fr);
      gap: 24px;
      align-items: start;
    }
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    .small-muted {
      font-size: 14px;
      color: var(--muted);
    }
    .canvas-wrap {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: #f8fafc;
      padding: 12px;
      overflow: auto;
    }
    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .chip {
      padding: 7px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #f8fafc;
      font-size: 14px;
    }
    .chip.derived {
      background: #fffbeb;
      border-color: #fcd34d;
    }
    .empty {
      color: var(--muted);
      font-size: 14px;
    }
    .info-box {
      border: 1px solid var(--border);
      border-radius: 18px;
      background: #f8fafc;
      padding: 16px;
    }
    .info-grid {
      display: grid;
      gap: 12px;
    }
    .info-title {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 3px;
    }
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    .table-card {
      border: 1px solid var(--border);
      border-radius: 18px;
      overflow: hidden;
      background: white;
      margin-top: 16px;
    }
    .table-title {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      background: #f8fafc;
      font-weight: 700;
    }
    .table-scroll { overflow-x: auto; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      border-bottom: 1px solid var(--border);
      padding: 10px 12px;
      text-align: center;
      white-space: nowrap;
    }
    th:first-child, td:first-child {
      text-align: left;
      position: sticky;
      left: 0;
      background: white;
      border-right: 1px solid var(--border);
      z-index: 1;
    }
    thead th {
      background: #f8fafc;
      font-weight: 700;
    }
    pre {
      margin: 0;
      background: #020617;
      color: #e2e8f0;
      padding: 16px;
      border-radius: 18px;
      overflow: auto;
      font-size: 14px;
    }
    .legend {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      font-size: 14px;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .swatch {
      width: 16px;
      height: 16px;
      border-radius: 999px;
      display: inline-block;
      border: 1px solid transparent;
    }
    .swatch.selected { background: #0f172a; }
    .swatch.derived { background: var(--derived); border-color: var(--derived-border); }
    .swatch.disabled { background: #e2e8f0; border-color: #94a3b8; }
    .arrow-wrap {
      display: flex;
      justify-content: center;
      padding-top: 180px;
    }
    .arrow-btn {
      border-radius: 18px;
      padding: 14px 18px;
      font-weight: 700;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.08);
    }
    .subsection-title {
      margin-top: 16px;
      font-size: 14px;
      font-weight: 700;
    }
    @media (max-width: 1100px) {
      .grid { grid-template-columns: 1fr; }
      .controls { grid-template-columns: 1fr; }
      .arrow-wrap { padding-top: 0; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel" data-presets="react" src="./app.jsx"></script>
</body>
</html>
